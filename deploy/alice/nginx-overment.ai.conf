# Canonical production nginx config for the Wonderlands app.
#
# Topology:
# - overment.ai (apex) is the canonical host. It serves the built client at
#   /ai/ and /ai/assets/, and proxies every other path to the app on
#   127.0.0.1:3001 (PM2 process "wonderlands-app").
# - www.overment.ai and alice.overment.ai redirect to the apex host,
#   preserving the request path.
#
# The TLS certificate for overment.ai must include www.overment.ai and
# alice.overment.ai as subject alternative names (see setup-nginx.sh).

server {
    listen 80;
    listen [::]:80;
    server_name overment.ai www.overment.ai alice.overment.ai;

    return 301 https://$host$request_uri;
}

# Non-canonical hostnames: redirect to the apex, preserving path.
server {
    listen 443 ssl http2;
    server_name www.overment.ai alice.overment.ai;

    ssl_certificate /etc/letsencrypt/live/overment.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/overment.ai/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    return 301 https://overment.ai$request_uri;
}

server {
    listen 443 ssl http2;
    server_name overment.ai;

    ssl_certificate /etc/letsencrypt/live/overment.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/overment.ai/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    client_max_body_size 25m;

    location = /ai {
        return 301 /ai/;
    }

    location /ai/assets/ {
        alias /home/alice/wonderlands/current/apps/client/dist/assets/;
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Built Svelte client. The client is built with base=/ai/.
    location /ai/ {
        alias /home/alice/wonderlands/current/apps/client/dist/;
        try_files $uri $uri/ /ai/index.html;
    }

    # Wonderlands API-hosted default Garden, app/API routes, auth routes, etc.
    # Reserved app/API paths are handled by the app itself.
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }
}
