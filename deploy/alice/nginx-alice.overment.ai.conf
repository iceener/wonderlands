server {
    listen 80;
    server_name alice.overment.ai;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name alice.overment.ai;

    ssl_certificate /etc/letsencrypt/live/alice.overment.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alice.overment.ai/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    client_max_body_size 25m;

    location = /pulse {
        return 301 /pulse/;
    }

    # Public Wonderlands Pulse event/memory API. The trailing slash strips /pulse/.
    # Example: /pulse/api/events -> http://127.0.0.1:3737/api/events
    location /pulse/ {
        proxy_pass http://127.0.0.1:3737/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /pulse;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }

    location = /ai {
        return 301 /ai/;
    }

    location /ai/assets/ {
        alias /home/alice/wonderlands/current/apps/client/dist/assets/;
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Vite/Svelte app shell. The client is built with base=/ai/.
    location /ai/ {
        alias /home/alice/wonderlands/current/apps/client/dist/;
        try_files $uri $uri/ /ai/index.html;
    }

    # Main app API, garden/root routes, auth routes, status, etc.
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }
}
